# Especially — Docker Compose para servicios de desarrollo local.
# Las credenciales se leen de un `.env` ubicado en este mismo directorio.
# Si alguna variable falta, Docker Compose aborta con un mensaje claro.

services:
  # Motor de base de datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: especially_db
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:?POSTGRES_USER no definido en .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD no definido en .env}
      POSTGRES_DB:       ${POSTGRES_DB:?POSTGRES_DB no definido en .env}
    ports:
      - "5432:5432"
    volumes:
      - especially_data:/var/lib/postgresql/data

  # Panel de administración visual (acceso en localhost:8080)
  pgadmin:
    image: dpage/pgadmin4
    container_name: especially_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_DEFAULT_EMAIL:?PGADMIN_DEFAULT_EMAIL no definido en .env}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD no definido en .env}
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  especially_data:
